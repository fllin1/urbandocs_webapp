<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWPLU - Connexion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">Connexion</h1>
                <div class="auth-subtitle">Accédez à votre compte MWPLU</div>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="form-input" placeholder="exemple@mail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Votre mot de passe" required>
                            <button type="button" id="togglePassword" class="toggle-password">
                                <span class="icon-eye-closed">👁</span>
                            </button>
                        </div>
                    </div>

                    <button id="loginBtn" class="auth-button" type="submit">
                        Se connecter
                        <span id="loginSpinner" class="spinner hidden"></span>
                    </button>
                </form>

                <div class="auth-links">
                    <a href="forgotten-password.html" class="text-link">Mot de passe oublié ?</a>
                    <a href="index.html" class="text-link">Retour à l'accueil</a>
                </div>

                <div id="errorMessage" class="error-message hidden"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/login.bundle.js"></script>
</body>
</html>
