<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWPLU - Confirmation d'Email</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">Confirmation d'Email</h1>
                <div class="auth-subtitle">Confirmez votre adresse email pour activer votre compte</div>

                <div id="loading" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p>Vérification en cours...</p>
                </div>

                <div class="terms-section">
                    <div class="form-group">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="tosCheckbox" disabled>
                            <span class="checkbox-label">J'ai lu et j'accepte les <a href="#" data-modal="tosModal" class="text-link">Conditions d'Utilisation</a></span>
                        </label>
                    </div>
                </div>

                <button id="confirmButton" class="auth-button" disabled>
                    Confirmer mon email
                    <span id="confirmSpinner" class="spinner hidden"></span>
                </button>

                <div class="auth-links">
                    <a href="index.html" class="text-link">Retour à l'accueil</a>
                </div>

                <div id="statusMessage" class="status-message">
                    Cliquez sur le bouton pour confirmer votre adresse email.
                </div>
            </div>
        </div>
    </div>

    <div id="tosModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Conditions d'Utilisation</h2>
                <button class="modal-close">×</button>
            </div>
            <div class="modal-body" id="tosModalBody">
                <p>Chargement des conditions d'utilisation...</p>
            </div>
        </div>
    </div>

    <script type="module" src="js/confirmation.bundle.js"></script>
</body>
</html>
