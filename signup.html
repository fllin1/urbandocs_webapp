<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWPLU - Création de compte</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">Créer un compte</h1>
                <div class="auth-subtitle">Accédez aux documents urbanistiques</div>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="form-input" placeholder="exemple@mail.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Créez un mot de passe" required>
                        </div>
                        <div class="form-hint">Plus de 8 caractères, 1 majuscule, 1 minuscule, 1 chiffre.</div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input" placeholder="Confirmez votre mot de passe" required>
                        </div>
                    </div>

                    <button id="signupBtn" class="auth-button" type="submit">
                        Créer un compte
                        <span id="signupSpinner" class="spinner hidden"></span>
                    </button>
                </form>

                <div class="auth-links">
                    <div class="auth-prompt">Vous avez déjà un compte ?</div>
                    <a href="login.html" class="text-link">Se connecter</a>
                    <a href="index.html" class="text-link">Retour à l'accueil</a>
                </div>

                <div id="errorMessage" class="error-message hidden"></div>
                <div id="statusMessage" class="status-message hidden"></div>
            </div>
        </div>
    </div>
    <script type="module" src="js/signup.bundle.js"></script>
</body>
</html>
